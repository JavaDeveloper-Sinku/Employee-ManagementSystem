version: '3.9'

services:

  mysql:
    image: mysql:8.4
    container_name: ems-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootuser99
      MYSQL_DATABASE: ems

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  employee-management:
    build: .

    container_name: employee-management

    restart: always

    depends_on:
      - mysql

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ems
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootuser99

volumes:
  mysql_data: